name: user_tws
description: "BeeTravel - Bambare Travel Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.4
  google_fonts: ^6.2.1
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3
  smooth_page_indicator: ^1.1.0
  file_saver: ^0.2.14
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  phone_numbers_parser: ^9.0.21
  intl_phone_field_v2: ^4.0.5
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - images/
    - images/home/
    - images/booking/Activity/
    - images/booking/Activity Background img/
